name: Test Setup

on:
  workflow_dispatch:  # Manual trigger only

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_flights.txt

      - name: Check secrets are configured
        env:
          END_POINT: ${{ secrets.END_POINT }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          MY_WHATSAPP: ${{ secrets.MY_WHATSAPP }}
          WHATSAPP_TOKEN: ${{ secrets.WHATSAPP_TOKEN }}
        run: |
          if [ -z "$END_POINT" ]; then
            echo "END_POINT secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "END_POINT is configured"
          fi

          if [ -z "$SERPAPI_KEY" ]; then
            echo "SERPAPI_KEY secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "SERPAPI_KEY is configured"
          fi

          if [ -z "$MY_WHATSAPP" ]; then
            echo "MY_WHATSAPP secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "MY_WHATSAPP is configured"
          fi
          
          if [ -z "$WHATSAPP_TOKEN" ]; then
            echo "WHATSAPP_TOKEN secret is not set!"
            echo "Go to Settings > Secrets > Actions and add it."
            exit 1
          else
            echo "WHATSAPP_TOKEN is configured"
          fi
          echo ""
          echo "All secrets are configured!"

      - name: Check required files exist
        run: |
          echo "Checking for required files..."

          if [ -f "check_flights.py" ]; then
            echo "check_flights.py found"
          else
            echo "check_flights.py not found!"
            exit 1
          fi

          if [ -f "requirements_flights.txt" ]; then
            echo "requirements_flights.txt found"
          else
            echo "requirements_flights.txt not found!"
            exit 1
          fi

          if [ -f "vuelos.txt" ]; then
            echo "vuelos.txt found"
          else
            echo "vuelos.txt not found!"
            exit 1
          fi

          echo ""
          echo "All required files found!"

      - name: Test Python syntax
        run: python -m py_compile check_flights.py && echo "Python syntax OK"

      - name: Success
        run: |
          echo ""
          echo "========================================"
          echo "  All checks passed!"
          echo "  Your setup is ready to go."
          echo "========================================"
